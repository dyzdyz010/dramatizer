name: dramatizer

services:
  postgres:
    image: postgres:17-alpine
    container_name: dramatizer-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - dramatizer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  dramatizer_postgres_data:
